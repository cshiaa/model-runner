name: Build model-runner-plugin

# ─────────────────────────────────────────────────────────────────────────────
# 触发条件：
#   - PR / push to main：执行 lint + test（与 ci.yml 一致）
#   - workflow_dispatch：手动触发完整发布流程（lint → test → build → release）
#     tag 由 prepare job 自动创建，无需提前手动打 tag
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bumpType:
        description: "Version bump type (ignored when releaseTag is provided)"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"
      releaseTag:
        description: "Explicit release tag — overrides auto-bump (e.g., v1.2.3)"
        required: false
        type: string

# 强制 Actions JS runtime 使用 Node.js 24（2026-06-02 后为默认值）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.26.0'
  BINARY_NAME: docker-model-plugin

# 全局最小权限；各 job 按需单独申请
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Lint — 与 ci.yml 完全对齐
  #    跨 linux / darwin / windows 三平台运行 make lint
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.10.1
          install-only: true

      - name: Run lint for ${{ matrix.goos }}
        env:
          GOOS: ${{ matrix.goos }}
        run: make lint

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Test — 与 ci.yml 完全对齐
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify vendor/ is not present
        run: stat vendor && exit 1 || exit 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests with race detection
        run: go test -race ./...

      - name: Validate
        run: make validate

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Prepare — 仅手动触发时执行
  #    自动计算或使用显式 tag，在仓库创建并推送 tag
  #    逻辑直接移植自 release.yml prepare job
  # ───────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare release tag
    if: github.event_name == 'workflow_dispatch'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version:     ${{ steps.resolve.outputs.version }}
      previous_tag: ${{ steps.resolve.outputs.previous_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        env:
          EXPLICIT_TAG: ${{ inputs.releaseTag }}
          BUMP_TYPE:    ${{ inputs.bumpType || 'patch' }}
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          echo "Latest existing tag: ${LATEST_TAG:-<none>}"

          if [ -n "$EXPLICIT_TAG" ]; then
            if ! echo "$EXPLICIT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag format: '$EXPLICIT_TAG'. Expected: v<MAJOR>.<MINOR>.<PATCH>"
              exit 1
            fi
            RELEASE_TAG="$EXPLICIT_TAG"
            VERSION="${EXPLICIT_TAG#v}"
            PREVIOUS_TAG="$LATEST_TAG"
            echo "Using explicit tag: $RELEASE_TAG"
          else
            if [ -z "$LATEST_TAG" ]; then
              echo "No existing tags — starting at v0.1.0"
              RELEASE_TAG="v0.1.0"
              VERSION="0.1.0"
              PREVIOUS_TAG=""
            else
              PREVIOUS_TAG="$LATEST_TAG"
              VERSION="${LATEST_TAG#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              case "$BUMP_TYPE" in
                major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR+1)); PATCH=0 ;;
                patch) PATCH=$((PATCH+1)) ;;
              esac
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
              RELEASE_TAG="v${VERSION}"
              echo "Auto-bumped $BUMP_TYPE: $LATEST_TAG → $RELEASE_TAG"
            fi
          fi

          echo "release_tag=$RELEASE_TAG"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG:-}" >> "$GITHUB_OUTPUT"
          echo "🏷️  Release tag:  $RELEASE_TAG"
          echo "🏷️  Version:      $VERSION"
          echo "🏷️  Previous tag: ${PREVIOUS_TAG:-<none>}"

      - name: Create and push tag
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $RELEASE_TAG already exists — skipping creation"
            exit 0
          fi
          echo "Creating tag $RELEASE_TAG on $(git rev-parse --short HEAD)"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "✅ Tag $RELEASE_TAG created and pushed"

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Build — 仅 Linux amd64 / arm64，手动触发时执行
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build (linux-${{ matrix.goarch }})
    if: github.event_name == 'workflow_dispatch'
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
          - goarch: arm
            goarm: '7'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS:        linux
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm || '' }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ needs.prepare.outputs.release_tag }}"
          OUTPUT="${{ env.BINARY_NAME }}-linux-${{ matrix.goarch }}"

          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.GitCommit=$(git rev-parse --short HEAD) \
            -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "${LDFLAGS}" \
            -o "dist/${OUTPUT}" \
            .

          echo "✅ Built: dist/${OUTPUT}"
          ls -lh "dist/${OUTPUT}"

      - name: Generate checksum
        run: |
          cd dist
          FILE="${{ env.BINARY_NAME }}-linux-${{ matrix.goarch }}"
          sha256sum "${FILE}" > "${FILE}.sha256"
          cat "${FILE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.BINARY_NAME }}-linux-${{ matrix.goarch }}
          path: |
            dist/${{ env.BINARY_NAME }}-linux-${{ matrix.goarch }}
            dist/${{ env.BINARY_NAME }}-linux-${{ matrix.goarch }}.sha256
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # 5. Package — 打包 .tar.gz 并汇总 checksums
  # ───────────────────────────────────────────────────────────────────────────
  package:
    name: Package archives
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: dist/
          pattern: ${{ env.BINARY_NAME }}-linux-*
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh dist/

      - name: Create archives
        run: |
          cd dist
          for f in ${{ env.BINARY_NAME }}-linux-*; do
            [[ "$f" == *.sha256 ]] && continue
            [[ -f "$f" ]] || continue
            chmod +x "$f"
            tar -czf "${f}.tar.gz" "$f"
            sha256sum "${f}.tar.gz" >> checksums.txt
          done
          cat *.sha256 >> checksums.txt 2>/dev/null || true
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Upload packaged archives
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.BINARY_NAME }}-archives
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # 6. Release — tag 已由 prepare job 创建，此处直接发布
  #    与 release.yml github-release job 对齐，使用 gh CLI
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch'
    needs: [prepare, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download packaged archives
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: ${{ env.BINARY_NAME }}-archives
          path: release-assets/

      - name: Generate release notes
        env:
          RELEASE_TAG:  ${{ needs.prepare.outputs.release_tag }}
          PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
        run: |
          echo "## What's Changed" > release-notes.md
          if [ -n "${PREVIOUS_TAG}" ]; then
            git log "${PREVIOUS_TAG}..${RELEASE_TAG}" \
              --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              >> release-notes.md
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${RELEASE_TAG}" >> release-notes.md
          else
            git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" -20 >> release-notes.md
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/tree/${RELEASE_TAG}" >> release-notes.md
          fi
          echo "" >> release-notes.md
          echo "## Checksums" >> release-notes.md
          echo '```' >> release-notes.md
          cat release-assets/checksums.txt >> release-notes.md 2>/dev/null || true
          echo '```' >> release-notes.md
          echo "✅ Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          PRERELEASE_FLAG=""
          if echo "$RELEASE_TAG" | grep -qE '\-(rc|beta|alpha)'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "model-runner-plugin $RELEASE_TAG" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            release-assets/*.tar.gz \
            release-assets/checksums.txt

          echo "✅ Release $RELEASE_TAG published"
