name: Build model-runner-plugin

# ─────────────────────────────────────────────────────────────────────────────
# 触发条件：与 ci.yml 保持一致（PR / push to main），
# 额外支持 tag 推送和手动触发（用于正式发布）
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit release tag — overrides auto-detect (e.g., v1.2.3)"
        required: false
        type: string

# 强制 Actions JS runtime 使用 Node.js 24（2026-06-02 后为默认值）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.26.0'
  BINARY_NAME: docker-model-plugin

# 全局最小权限；release job 单独申请 contents: write
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Lint — 与 ci.yml 完全对齐
  #    跨三个平台运行 make lint，使用精确 commit hash 固定所有 action 版本
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.10.1
          install-only: true

      - name: Run lint for ${{ matrix.goos }}
        env:
          GOOS: ${{ matrix.goos }}
        run: make lint

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Test — 与 ci.yml 完全对齐
  #    检查 vendor 缺失、go mod tidy、竞态测试、make validate
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify vendor/ is not present
        run: stat vendor && exit 1 || exit 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests with race detection
        run: go test -race ./...

      - name: Validate
        run: make validate

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Build — 跨平台构建二进制
  #    仅在 lint + test 均通过后执行
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: '7'
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # 版本号优先级：手动输入 > tag > dev-<short-sha>
      # 与 release.yml prepare job 的逻辑保持一致
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "🏷️  Build version: ${VERSION}"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT="${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}"

          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.GitCommit=$(git rev-parse --short HEAD) \
            -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "${LDFLAGS}" \
            -o "dist/${OUTPUT}" \
            .

          echo "✅ Built: dist/${OUTPUT}"
          ls -lh "dist/${OUTPUT}"

      - name: Generate checksum
        run: |
          cd dist
          FILE="${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}"
          sha256sum "${FILE}" > "${FILE}.sha256"
          cat "${FILE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
            dist/${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}.sha256
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Package — 打包归档并汇总 checksums
  # ───────────────────────────────────────────────────────────────────────────
  package:
    name: Package archives
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: dist/
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh dist/

      - name: Create archives
        run: |
          cd dist

          # Linux / macOS → .tar.gz
          for f in ${{ env.BINARY_NAME }}-linux-* ${{ env.BINARY_NAME }}-darwin-*; do
            [[ "$f" == *.sha256 ]] && continue
            [[ -f "$f" ]] || continue
            chmod +x "$f"
            tar -czf "${f}.tar.gz" "$f"
            sha256sum "${f}.tar.gz" >> checksums.txt
          done

          # Windows → .zip
          for f in ${{ env.BINARY_NAME }}-windows-*.exe; do
            [[ -f "$f" ]] || continue
            zip "${f%.exe}.zip" "$f"
            sha256sum "${f%.exe}.zip" >> checksums.txt
          done

          # 合并单文件 sha256
          cat *.sha256 >> checksums.txt 2>/dev/null || true

          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Upload packaged archives
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.BINARY_NAME }}-archives
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # 5. Release — 仅 tag 推送时执行，与 release.yml github-release job 对齐
  #    使用 gh CLI 创建 Release（与 release.yml 保持一致）
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download packaged archives
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: ${{ env.BINARY_NAME }}-archives
          path: release-assets/

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || echo "")

          echo "## What's Changed" > release-notes.md
          if [ -n "${PREV_TAG}" ]; then
            git log "${PREV_TAG}..${RELEASE_TAG}" \
              --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              >> release-notes.md
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}" >> release-notes.md
          else
            git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" -20 >> release-notes.md
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/tree/${RELEASE_TAG}" >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "## Checksums" >> release-notes.md
          echo '```' >> release-notes.md
          cat release-assets/checksums.txt >> release-notes.md 2>/dev/null || true
          echo '```' >> release-notes.md

          echo "✅ Release notes:"
          cat release-notes.md

      # 与 release.yml 保持一致：使用 gh CLI 而非第三方 action
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          if echo "$RELEASE_TAG" | grep -qE '\-(rc|beta|alpha)'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "model-runner-plugin $RELEASE_TAG" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            release-assets/*.tar.gz \
            release-assets/*.zip \
            release-assets/checksums.txt

          echo "✅ Release $RELEASE_TAG published"
